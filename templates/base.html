<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Recognition Attendance System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>

        body{
            background:#070b16;
            overflow-x:hidden;
        }

        /* NAVBAR */

        .navbar{
            background:#0d1324 !important;
            border-bottom:1px solid rgba(0,255,255,.15);
        }

        .navbar-brand{
            font-weight:700;
            color:#00e5ff !important;
            font-size:1.3rem;
        }

        /* SIDEBAR */

        .sidebar{
            width:250px;
            min-height:100vh;

            background:linear-gradient(
                180deg,
                #0d1324,
                #131d35
            );

            border-right:1px solid rgba(0,255,255,.15);
        }

        .sidebar h5{
            color:white;
            font-weight:600;
        }

        .sidebar-link{

            display:block;

            color:#b8c7ff;

            text-decoration:none;

            padding:15px 25px;

            transition:.3s;

            font-size:16px;
        }

        .sidebar-link:hover{

            background:rgba(0,229,255,.15);

            color:#00e5ff;

            border-left:4px solid #00e5ff;
        }

        /* MAIN CONTENT */

        .content{
            background:#070b16;
            min-height:100vh;
            color:white;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark shadow">
    <div class="container-fluid">

        <span class="navbar-brand">
            <i class="bi bi-camera-video-fill"></i>
            Smart Face Recognition Attendance System
        </span>

    </div>
</nav>

<div class="d-flex">

    <!-- SIDEBAR -->
     <div class="sidebar">

    <h5 class="p-3">
        <i class="bi bi-grid-fill"></i>
        Menu
    </h5>

    <a href="/home" class="sidebar-link">
        🏡 Home
    </a>

    {% if session.get('user') %}

        <a href="/login" class="sidebar-link">
            📊 Dashboard
        </a>

        <a href="/attendance" class="sidebar-link">
            📋 Attendance
        </a>

        <a href="/students" class="sidebar-link">
            👨‍🎓 Students
        </a>

        <a href="/export" class="sidebar-link">
            📊 Export Excel
        </a>

        <a href="/settings" class="sidebar-link">
            ⚙ Settings
        </a>

        <a href="/logout" class="sidebar-link">
            🚪 Logout
        </a>

    {% else %}

        <a href="/login" class="sidebar-link">
            🔐 Admin Login
        </a>

    {% endif %}

</div>
    <!-- MAIN CONTENT -->

    <div class="content p-4 w-100">

        {% block content %}
        {% endblock %}

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
